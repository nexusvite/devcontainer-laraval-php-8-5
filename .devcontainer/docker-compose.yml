version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      - ../..:/workspaces:cached

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Shared network so app can reach all database containers on 127.0.0.1
    network_mode: service:db

    environment:
      - DB_NAME=${DB_NAME:-devcontainer_db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-mariadb}
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - PG_NAME=${DB_NAME:-devcontainer_db}
      - PG_USER=${PG_USER:-postgres}
      - PG_PASSWORD=${PG_PASSWORD:-postgres}
      - PG_HOST=127.0.0.1
      - PG_PORT=5432
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

  db:
    image: mariadb:10.4
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - mariadb-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-mariadb}
      MYSQL_DATABASE: ${DB_NAME:-devcontainer_db}
      MYSQL_USER: ${DB_USER:-devuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mariadb}

  postgres:
    image: postgres:18
    restart: unless-stopped
    network_mode: service:db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-devcontainer_db}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}

volumes:
  mariadb-data:
  postgres-data:
